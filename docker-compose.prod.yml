# ============================================================
# Production deployment
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Requires .env file with:
#   POSTGRES_PASSWORD, SECRET_KEY, DOMAIN (optional)
# ============================================================

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-slt_db}
      POSTGRES_USER: ${POSTGRES_USER:-slt_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-slt_user} -d ${POSTGRES_DB:-slt_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal
    # No ports exposed to host in production — only internal network
    deploy:
      resources:
        limits:
          memory: 512M

  app:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-seraphs-loadout-tool}:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-slt_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-slt_db}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      ENV: ${ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      POSTMARK_SERVER_TOKEN: ${POSTMARK_SERVER_TOKEN:-}
      POSTMARK_FROM_EMAIL: ${POSTMARK_FROM_EMAIL:-}
      POSTMARK_MESSAGE_STREAM: ${POSTMARK_MESSAGE_STREAM:-outbound}
      OBSERVABILITY_PROVIDER: ${OBSERVABILITY_PROVIDER:-none}
      OBSERVABILITY_SERVICE_NAME: ${OBSERVABILITY_SERVICE_NAME:-backend}
      OBSERVABILITY_INCLUDE_ACCESS_LOGS: ${OBSERVABILITY_INCLUDE_ACCESS_LOGS:-false}
      OBSERVABILITY_INCLUDE_HEALTHCHECKS: ${OBSERVABILITY_INCLUDE_HEALTHCHECKS:-false}
      OBSERVABILITY_REMOTE_TIMEOUT_S: ${OBSERVABILITY_REMOTE_TIMEOUT_S:-3.0}
      OBSERVABILITY_REMOTE_BATCH_SIZE: ${OBSERVABILITY_REMOTE_BATCH_SIZE:-25}
      OBSERVABILITY_REMOTE_FLUSH_INTERVAL_S: ${OBSERVABILITY_REMOTE_FLUSH_INTERVAL_S:-2.0}
      BETTER_STACK_SOURCE_TOKEN: ${BETTER_STACK_SOURCE_TOKEN:-}
      BETTER_STACK_INGESTING_HOST: ${BETTER_STACK_INGESTING_HOST:-}
      BETTER_STACK_HTTP_API_URL: ${BETTER_STACK_HTTP_API_URL:-}
      GRAFANA_CLOUD_LOGS_URL: ${GRAFANA_CLOUD_LOGS_URL:-}
      GRAFANA_CLOUD_LOGS_USER_ID: ${GRAFANA_CLOUD_LOGS_USER_ID:-}
      GRAFANA_CLOUD_API_KEY: ${GRAFANA_CLOUD_API_KEY:-}
      GRAFANA_CLOUD_LOGS_JOB: ${GRAFANA_CLOUD_LOGS_JOB:-backend}
      METRICS_ENABLED: ${METRICS_ENABLED:-false}
      METRICS_BASIC_AUTH_USERNAME: ${METRICS_BASIC_AUTH_USERNAME:-}
      METRICS_BASIC_AUTH_PASSWORD: ${METRICS_BASIC_AUTH_PASSWORD:-}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      # Mount SSL certs if using HTTPS
      # - ./certs:/etc/ssl/certs:ro
      # - ./private:/etc/ssl/private:ro
      # Persistent logs
      - app_logs:/var/log/slt
      # Persistent curated mod uploads
      - /opt/swg-loadout-data/mods:/app/data/mods
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/api/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'

volumes:
  postgres_data:
    driver: local
  app_logs:
    driver: local

networks:
  internal:
    driver: bridge
