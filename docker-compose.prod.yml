# ============================================================
# Production deployment
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Requires .env file with:
#   POSTGRES_PASSWORD, SECRET_KEY, DOMAIN (optional)
# ============================================================

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-slt_db}
      POSTGRES_USER: ${POSTGRES_USER:-slt_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-slt_user} -d ${POSTGRES_DB:-slt_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal
    # No ports exposed to host in production — only internal network
    deploy:
      resources:
        limits:
          memory: 512M

  app:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-seraphs-loadout-tool}:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-slt_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-slt_db}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      ENV: ${ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      METRICS_ENABLED: ${METRICS_ENABLED:-false}
      METRICS_PATH: ${METRICS_PATH:-/api/metrics}
      METRICS_BASIC_AUTH_USERNAME: ${METRICS_BASIC_AUTH_USERNAME:-}
      METRICS_BASIC_AUTH_PASSWORD: ${METRICS_BASIC_AUTH_PASSWORD:-}
      PROMETHEUS_MULTIPROC_DIR: /var/run/slt/prometheus
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      POSTMARK_SERVER_TOKEN: ${POSTMARK_SERVER_TOKEN:-}
      POSTMARK_FROM_EMAIL: ${POSTMARK_FROM_EMAIL:-}
      POSTMARK_MESSAGE_STREAM: ${POSTMARK_MESSAGE_STREAM:-outbound}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      # Mount SSL certs if using HTTPS
      # - ./certs:/etc/ssl/certs:ro
      # - ./private:/etc/ssl/private:ro
      # Persistent logs
      - app_logs:/var/log/slt
      # Persistent curated mod uploads
      - /opt/swg-loadout-data/mods:/app/data/mods
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/api/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      METRICS_PATH: ${METRICS_PATH:-/api/metrics}
      METRICS_BASIC_AUTH_USERNAME: ${METRICS_BASIC_AUTH_USERNAME:-}
      METRICS_BASIC_AUTH_PASSWORD: ${METRICS_BASIC_AUTH_PASSWORD:-}
      GRAFANA_CLOUD_METRICS_URL: ${GRAFANA_CLOUD_METRICS_URL:-}
      GRAFANA_CLOUD_METRICS_USER_ID: ${GRAFANA_CLOUD_METRICS_USER_ID:-}
      GRAFANA_CLOUD_METRICS_API_KEY: ${GRAFANA_CLOUD_METRICS_API_KEY:-}
      PROMETHEUS_SCRAPE_INTERVAL: ${PROMETHEUS_SCRAPE_INTERVAL:-15s}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        mkdir -p /etc/prometheus/generated
        cat > /etc/prometheus/generated/prometheus.yml <<EOF
        global:
          scrape_interval: $${PROMETHEUS_SCRAPE_INTERVAL}
          evaluation_interval: $${PROMETHEUS_SCRAPE_INTERVAL}

        scrape_configs:
          - job_name: 'jawatracks-backend'
            metrics_path: '$${METRICS_PATH}'
            scheme: http
            basic_auth:
              username: '$${METRICS_BASIC_AUTH_USERNAME}'
              password: '$${METRICS_BASIC_AUTH_PASSWORD}'
            static_configs:
              - targets: ['app:80']
        EOF

        if [ -n "$${GRAFANA_CLOUD_METRICS_URL}" ] && [ -n "$${GRAFANA_CLOUD_METRICS_USER_ID}" ] && [ -n "$${GRAFANA_CLOUD_METRICS_API_KEY}" ]; then
          cat >> /etc/prometheus/generated/prometheus.yml <<EOF

        remote_write:
          - url: '$${GRAFANA_CLOUD_METRICS_URL}'
            basic_auth:
              username: '$${GRAFANA_CLOUD_METRICS_USER_ID}'
              password: '$${GRAFANA_CLOUD_METRICS_API_KEY}'
            queue_config:
              capacity: 2500
              max_shards: 10
              min_shards: 1
              max_samples_per_send: 1000
              batch_send_deadline: 5s
        EOF
          echo 'Prometheus remote_write enabled for Grafana Cloud'
        else
          echo 'Prometheus running without remote_write because Grafana Cloud metrics env vars are incomplete'
        fi

        exec /bin/prometheus --config.file=/etc/prometheus/generated/prometheus.yml --storage.tsdb.path=/prometheus --web.listen-address=:9090
    volumes:
      - prometheus_data:/prometheus
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256M
volumes:
  postgres_data:
    driver: local
  app_logs:
    driver: local
  prometheus_data:
    driver: local

networks:
  internal:
    driver: bridge
