# ============================================================
# Production deployment
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Requires .env file with:
#   POSTGRES_PASSWORD, SECRET_KEY, DOMAIN (optional)
# ============================================================

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-slt_db}
      POSTGRES_USER: ${POSTGRES_USER:-slt_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-slt_user} -d ${POSTGRES_DB:-slt_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal
    # No ports exposed to host in production — only internal network
    deploy:
      resources:
        limits:
          memory: 512M

  app:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-seraphs-loadout-tool}:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-slt_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-slt_db}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      # Mount SSL certs if using HTTPS
      # - ./certs:/etc/ssl/certs:ro
      # - ./private:/etc/ssl/private:ro
      # Persistent logs
      - app_logs:/var/log/slt
      # Persistent curated mod uploads
      - /opt/swg-loadout-data/mods:/app/backend/data/mods
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'

volumes:
  postgres_data:
    driver: local
  app_logs:
    driver: local

networks:
  internal:
    driver: bridge
