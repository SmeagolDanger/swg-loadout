name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  # ─────────────────────────────────────────────
  # Backend: Lint + Test
  # ─────────────────────────────────────────────
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install ruff pyright

      - name: Ruff lint
        run: ruff check backend/ --output-format github

      - name: Ruff format check
        run: ruff format --check backend/

      - name: Pyright type check
        working-directory: backend
        run: pyright .
        continue-on-error: true  # Advisory for now, don't block

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: slt_test_db
          POSTGRES_USER: slt_test
          POSTGRES_PASSWORD: slt_test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U slt_test -d slt_test_db"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://slt_test:slt_test_pass@localhost:5432/slt_test_db
          SECRET_KEY: test-secret-key-not-for-production
        run: pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────
  # Frontend: Lint + Build
  # ─────────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ─────────────────────────────────────────────
  # Docker: Build & Push Images
  # ─────────────────────────────────────────────
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, frontend-lint]
    if: github.event_name == 'push'
    strategy:
      matrix:
        include:
          - target: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            suffix: -backend
          - target: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            suffix: -frontend
          - target: production
            context: .
            dockerfile: ./Dockerfile.prod
            suffix: ''

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.suffix }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
          platforms: linux/amd64

  # ─────────────────────────────────────────────
  # Deploy (on tag push)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'push'
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v6

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            
            # Pull latest images
            docker compose -f docker-compose.prod.yml pull
            
            # Rolling restart with zero downtime
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            
            # Wait for health check
            echo "Waiting for health check..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:80/api/health > /dev/null 2>&1; then
                echo "Backend healthy after ${i}s"
                break
              fi
              sleep 1
            done
            
            # Prune old images
            docker image prune -f --filter "until=168h"
            
            echo "Deployment complete: ${{ github.ref_name }}"

      - name: Verify deployment
        run: |
          echo "Deployed ${{ github.ref_name }} to production"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}"

      - name: Notify Discord
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          title: "SWG:L Deployment"
          description: |
            **Ref:** `${{ github.ref_name }}`
            **Commit:** ${{ github.event.head_commit.message }}
          color: ${{ job.status == 'success' && '0x29db35' || '0xf87171' }}
          username: "SWG:L CI"
          nodetail: true
