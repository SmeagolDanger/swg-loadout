user slt;
worker_processes auto;
pid /run/nginx/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # ── Gzip ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # ── Rate limiting ────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=60r/s;

    # ── Request size limits ──────────────────────────────────
    client_max_body_size 2m;
    client_body_buffer_size 16k;

    # ── Security headers map ─────────────────────────────────
    map $sent_http_content_type $csp_header {
        default "";
        "text/html" "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'";
    }

    # ── Upstream: Gunicorn ───────────────────────────────────
    upstream backend {
        server unix:/var/run/slt/gunicorn.sock fail_timeout=0;
    }

    # ── HTTP → HTTPS redirect (uncomment for SSL) ───────────
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }

    server {
        listen 80;
        # listen 443 ssl http2;            # Uncomment for SSL
        server_name _;

        # ── SSL (uncomment and configure for production) ─────
        # ssl_certificate     /etc/ssl/certs/slt.crt;
        # ssl_certificate_key /etc/ssl/private/slt.key;
        # ssl_protocols       TLSv1.2 TLSv1.3;
        # ssl_ciphers         HIGH:!aNULL:!MD5;
        # ssl_prefer_server_ciphers on;
        # ssl_session_cache   shared:SSL:10m;
        # ssl_session_timeout 10m;

        root /app/static;
        index index.html;

        # ── Security headers ─────────────────────────────────
        # These apply to any location that does NOT have its own add_header.
        # Locations with their own add_header must `include` security-headers.conf
        # because nginx's add_header does NOT inherit into child blocks.
        include /etc/nginx/security-headers.conf;

        # Hide server version
        server_tokens off;

        # ── Static assets (immutable hashed files) ───────────
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            include /etc/nginx/security-headers.conf;
            access_log off;
        }

        # ── Other static files ───────────────────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public";
            include /etc/nginx/security-headers.conf;
            access_log off;
            try_files $uri =404;
        }

        # ── Auth endpoints (strict rate limit) ───────────────
        location /api/auth/ {
            limit_req zone=auth burst=3 nodelay;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_send_timeout 10s;
        }

        # ── API endpoints ────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
            proxy_send_timeout 30s;

            # Don't cache API responses
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            include /etc/nginx/security-headers.conf;
        }

        # ── Health check (no rate limit) ─────────────────────
        location = /api/health {
            proxy_pass http://backend;
            access_log off;
        }

        # ── SPA fallback ─────────────────────────────────────
        location / {
            limit_req zone=general burst=30 nodelay;
            try_files $uri $uri/ /index.html;

            # Don't cache index.html (hashed assets are cached above)
            location = /index.html {
                add_header Cache-Control "no-cache";
                include /etc/nginx/security-headers.conf;
            }
        }

        # ── Block dotfiles ───────────────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
